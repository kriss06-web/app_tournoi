<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCG Tracker Pro</title>
    <style>
        :root { 
            --primary: #3b82f6; --primary-dark: #2563eb;
            --bg: #f1f5f9; --card: #ffffff;
            --text-main: #0f172a; --text-sub: #64748b;
            --win: #10b981; --lose: #ef4444;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); color: var(--text-main);
            margin: 0; padding: env(safe-area-inset-top) 15px 40px 15px; 
        }

        header { padding: 20px 0; border-bottom: 1px solid #e2e8f0; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.5rem; font-weight: 800; }

        .card { 
            background: var(--card); padding: 18px; border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05);
        }
        .hidden { display: none; }

        input, select, textarea { 
            width: 100%; padding: 12px 16px; margin-bottom: 15px;
            border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem;
            background: #f8fafc;
        }

        button { 
            background: var(--primary); color: white; border: none; padding: 14px;
            border-radius: 12px; font-weight: 700; cursor: pointer;
            font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-sec { background: #64748b; }
        .btn-dan { background: #fee2e2; color: var(--lose); padding: 8px 12px; font-size: 0.8rem; width: auto; }
        .btn-plus { width: 50px; height: 48px; background: var(--win); margin-bottom: 15px; font-size: 1.5rem; }

        .match-item { 
            border-left: 6px solid #cbd5e1; padding: 12px; margin: 12px 0;
            background: #fff; border-radius: 8px; position: relative;
        }
        .match-item.WIN { border-color: var(--win); background: #f0fdf4; }
        .match-item.LOSE { border-color: var(--lose); background: #fef2f2; }
        
        .stat-card { cursor: pointer; }
        .stat-bar-bg { background: #e2e8f0; height: 8px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .stat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        
        .matchup-detail { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e2e8f0; font-size: 0.9rem; }
        .matchup-row { margin-bottom: 12px; }
        .flex-row { display: flex; gap: 10px; align-items: flex-start; }
    </style>
</head>
<body>

    <header><h1>🏆 TCG Tracker</h1></header>

    <!-- ACCUEIL -->
    <div id="sec-home">
        <button onclick="nav('sec-new-event')">➕ Nouveau Tournoi</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button class="btn-sec" onclick="nav('sec-decks')">🎴 Decks</button>
            <button class="btn-sec" onclick="nav('sec-stats')">📊 Stats</button>
        </div>
        
        <h2 style="margin: 25px 0 15px 0; font-size: 1.2rem;">Historique</h2>
        <div id="list-events"></div>

        <!-- ZONE DE SAUVEGARDE (JSON) -->
        <div style="margin-top:40px; display:flex; gap:10px; padding: 20px 0; border-top: 1px solid #e2e8f0;">
            <button class="btn-sec" style="font-size:0.75rem; flex:1" onclick="exportData()">💾 Sauver JSON</button>
            <button class="btn-sec" style="font-size:0.75rem; flex:1" onclick="document.getElementById('fileIn').click()">📂 Charger JSON</button>
            <input type="file" id="fileIn" class="hidden" onchange="importData(event)">
        </div>
    </div>

    <!-- NOUVEAU TOURNOI -->
    <div id="sec-new-event" class="hidden">
        <button class="btn-sec" onclick="nav('sec-home')">⬅ Retour</button>
        <div class="card" style="margin-top: 15px;">
            <h2>Démarrer un Tournoi</h2>
            <input type="text" id="ev-name" placeholder="Nom du tournoi">
            <div class="flex-row">
                <input type="date" id="ev-date" style="flex:1">
                <input type="text" id="ev-place" placeholder="Lieu" style="flex:1">
            </div>
            <label style="font-size:0.8rem; font-weight:bold; color:var(--text-sub)">MON DECK</label>
            <div class="flex-row">
                <select id="sel-my-deck"></select>
                <button class="btn-plus" onclick="quickAdd('myDecks', 'sel-my-deck')">+</button>
            </div>
            <button onclick="handleCreateTournament()">🚀 Créer le Tournoi</button>
        </div>
    </div>

    <!-- MATCHS -->
    <div id="sec-matches" class="hidden">
        <button class="btn-sec" onclick="nav('sec-home')">⬅ Retour Accueil</button>
        <div class="card" style="margin-top: 15px; border-left: 5px solid var(--primary);">
            <h2 id="view-title" style="margin:0">---</h2>
            <p id="view-info" style="margin:5px 0 0 0; color:var(--text-sub)"></p>
        </div>
        <div id="matches-list"></div>
        <div class="card" style="margin-top: 20px; background: #f8fafc;">
            <h3>Nouveau Match</h3>
            <input type="text" id="m-opp-name" placeholder="Adversaire">
            <label style="font-size:0.8rem; font-weight:bold; color:var(--text-sub)">SON DECK</label>
            <div class="flex-row">
                <select id="sel-opp-deck"></select>
                <button class="btn-plus" onclick="quickAdd('oppDecks', 'sel-opp-deck')">+</button>
            </div>
            <select id="m-res">
                <option value="WIN">✅ VICTOIRE</option>
                <option value="LOSE">❌ DÉFAITE</option>
            </select>
            <textarea id="m-comm" rows="2" placeholder="Commentaire..."></textarea>
            <button onclick="handleAddMatch()">Enregistrer le Match</button>
        </div>
    </div>

    <!-- GESTION DECKS -->
    <div id="sec-decks" class="hidden">
        <button class="btn-sec" onclick="nav('sec-home')">⬅ Retour</button>
        <div class="card" style="margin-top: 15px;">
            <h3>Mes Decks</h3>
            <div class="flex-row">
                <input type="text" id="in-my-deck" placeholder="Nom">
                <button class="btn-plus" onclick="manualAdd('myDecks', 'in-my-deck')">+</button>
            </div>
            <div id="render-my-decks"></div>
        </div>
        <div class="card">
            <h3>Decks Adversaires</h3>
            <div class="flex-row">
                <input type="text" id="in-opp-deck" placeholder="Nom">
                <button class="btn-plus" onclick="manualAdd('oppDecks', 'in-opp-deck')">+</button>
            </div>
            <div id="render-opp-decks"></div>
        </div>
    </div>

    <!-- STATS -->
    <div id="sec-stats" class="hidden">
        <button class="btn-sec" onclick="nav('sec-home')">⬅ Retour</button>
        <p style="font-size: 0.8rem; color: var(--text-sub); margin: 10px 5px;">Cliquez sur un deck pour voir les matchups.</p>
        <div id="render-stats"></div>
    </div>

<script>
    let db = { events: [], myDecks: ["Deck Standard"], oppDecks: ["Inconnu"], activeId: null };

    // Format DD/MM/YY
    function fmtDate(isoStr) {
        if(!isoStr) return "--/--/--";
        const d = new Date(isoStr);
        return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'2-digit'});
    }

    function loadDB() {
        const saved = localStorage.getItem('tournoi_meta_db');
        if(saved) db = JSON.parse(saved);
        document.getElementById('ev-date').value = new Date().toISOString().split('T')[0];
        renderHome();
        updateAllSelects();
    }

    function saveDB() { localStorage.setItem('tournoi_meta_db', JSON.stringify(db)); }

    function nav(id) {
        document.querySelectorAll('body > div[id^="sec-"]').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'sec-home') renderHome();
        if(id === 'sec-decks') renderDecksView();
        if(id === 'sec-stats') renderStatsView();
        window.scrollTo(0,0);
    }

    function updateAllSelects() {
        const sMy = document.getElementById('sel-my-deck');
        const sOpp = document.getElementById('sel-opp-deck');
        if(sMy) sMy.innerHTML = db.myDecks.sort().map(d => `<option value="${d}">${d}</option>`).join('');
        if(sOpp) sOpp.innerHTML = db.oppDecks.sort().map(d => `<option value="${d}">${d}</option>`).join('');
    }

    function quickAdd(type, selectId) {
        const n = prompt("Nom du deck :");
        if(n) { db[type].push(n); saveDB(); updateAllSelects(); document.getElementById(selectId).value = n; }
    }

    function manualAdd(type, inputId) {
        const val = document.getElementById(inputId).value;
        if(val) { db[type].push(val); document.getElementById(inputId).value = ""; saveDB(); updateAllSelects(); renderDecksView(); }
    }

    function deleteDeck(type, name) {
        if(confirm(`Supprimer "${name}" ?`)) { db[type] = db[type].filter(d => d !== name); saveDB(); updateAllSelects(); renderDecksView(); }
    }

    function renderDecksView() {
        const ui = (type, divId) => {
            document.getElementById(divId).innerHTML = db[type].sort().map(d => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;"><span>${d}</span><button class="btn-dan" onclick="deleteDeck('${type}', '${d}')">X</button></div>`).join('');
        };
        ui('myDecks', 'render-my-decks');
        ui('oppDecks', 'render-opp-decks');
    }

    function handleCreateTournament() {
        const newEv = { id: Date.now(), name: document.getElementById('ev-name').value || "Tournoi", date: document.getElementById('ev-date').value, place: document.getElementById('ev-place').value || "", myDeck: document.getElementById('sel-my-deck').value, matches: [] };
        db.events.unshift(newEv); saveDB(); openTournament(newEv.id);
    }

    function openTournament(id) {
        db.activeId = id; const ev = db.events.find(e => e.id === id); if(!ev) return nav('sec-home');
        document.getElementById('view-title').innerText = ev.name;
        document.getElementById('view-info').innerHTML = `📅 ${fmtDate(ev.date)} • 🎴 <b>${ev.myDeck}</b>`;
        renderMatchesView(ev); nav('sec-matches');
    }

    function renderHome() {
        document.getElementById('list-events').innerHTML = db.events.map(ev => `<div class="card" style="display:flex; justify-content:space-between; align-items:center;"><div><h3 style="margin:0">${ev.name}</h3><p style="margin:5px 0 0 0; font-size:0.8rem; color:var(--text-sub)">${fmtDate(ev.date)} • ${ev.myDeck} • <b>${ev.matches.length} m.</b></p></div><div style="display:flex; flex-direction:column; gap:5px;"><button onclick="openTournament(${ev.id})">Ouvrir</button><button class="btn-dan" onclick="if(confirm('Suppr?')){db.events=db.events.filter(e=>e.id!==${ev.id});saveDB();renderHome();}">X</button></div></div>`).join('');
    }

    function handleAddMatch() {
        const ev = db.events.find(e => e.id === db.activeId);
        ev.matches.push({ id: Date.now(), oppName: document.getElementById('m-opp-name').value || "Adv.", oppDeck: document.getElementById('sel-opp-deck').value, res: document.getElementById('m-res').value, comm: document.getElementById('m-comm').value || "" });
        saveDB(); renderMatchesView(ev); document.getElementById('m-opp-name').value = ""; document.getElementById('m-comm').value = "";
    }

    function renderMatchesView(ev) {
        document.getElementById('matches-list').innerHTML = ev.matches.map(m => `<div class="match-item ${m.res}"><strong>${m.res} vs ${m.oppName}</strong><div style="font-size:0.8rem; color:var(--text-sub)">Deck Adv: ${m.oppDeck}</div><div style="font-style:italic; font-size:0.8rem">${m.comm}</div><button class="btn-dan" style="position:absolute; top:5px; right:5px;" onclick="if(confirm('Supprimer?')){const ev=db.events.find(e=>e.id===db.activeId);ev.matches=ev.matches.filter(ma=>ma.id!==${m.id});saveDB();renderMatchesView(ev);}">X</button></div>`).join('');
    }

    function toggleMatchup(deckName) {
        const id = 'detail-' + deckName.replace(/\s+/g, '-');
        document.getElementById(id).classList.toggle('hidden');
    }

    function renderStatsView() {
        let stats = {};
        db.events.forEach(ev => {
            if(!stats[ev.myDeck]) stats[ev.myDeck] = { w: 0, l: 0, matchups: {} };
            ev.matches.forEach(m => {
                if(m.res === 'WIN') stats[ev.myDeck].w++; else stats[ev.myDeck].l++;
                if(!stats[ev.myDeck].matchups[m.oppDeck]) stats[ev.myDeck].matchups[m.oppDeck] = { w: 0, l: 0 };
                if(m.res === 'WIN') stats[ev.myDeck].matchups[m.oppDeck].w++; else stats[ev.myDeck].matchups[m.oppDeck].l++;
            });
        });
        let html = "";
        for(let d in stats) {
            let total = stats[d].w + stats[d].l;
            let wr = total > 0 ? Math.round((stats[d].w / total) * 100) : 0;
            let deckId = d.replace(/\s+/g, '-');
            html += `<div class="card stat-card" onclick="toggleMatchup('${d}')"><div style="display:flex; justify-content:space-between; align-items:center;"><span style="font-weight:800">${d}</span><span style="font-weight:800; background:#f1f5f9; padding:4px 8px; border-radius:8px;">${wr}%</span></div><div style="font-size:0.8rem; color:var(--text-sub); margin-top:5px;">Total: ${stats[d].w}W - ${stats[d].l}L</div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${wr}%; background:${wr > 50 ? 'var(--win)' : 'var(--primary)'}"></div></div><div id="detail-${deckId}" class="matchup-detail hidden">`;
            for(let opp in stats[d].matchups) {
                let mw = stats[d].matchups[opp].w; let ml = stats[d].matchups[opp].l; let mt = mw + ml; let mwr = Math.round((mw / mt) * 100);
                html += `<div class="matchup-row"><div style="display:flex; justify-content:space-between; font-size:0.8rem"><span>vs <b>${opp}</b></span><span>${mw}W-${ml}L (${mwr}%)</span></div><div class="stat-bar-bg" style="height:4px"><div class="stat-bar-fill" style="width:${mwr}%; background:${mwr >= 50 ? 'var(--win)' : 'var(--lose)'}"></div></div></div>`;
            }
            html += `</div></div>`;
        }
        document.getElementById('render-stats').innerHTML = html || "<div class='card'>Aucune donnée.</div>";
    }

    // --- FONCTIONS IMPORT / EXPORT ---
    function exportData() {
        const dataStr = JSON.stringify(db);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_tcg_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if(imported.events) {
                    db = imported;
                    saveDB();
                    loadDB();
                    alert("Données chargées avec succès !");
                }
            } catch(err) {
                alert("Erreur lors du chargement du fichier.");
            }
        };
        reader.readAsText(file);
    }

    loadDB();
</script>
</body>
</html>
