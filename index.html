<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournoi Tracker Pro</title>
    <style>
        :root { 
            --primary: #3b82f6; --primary-dark: #2563eb;
            --bg: #f1f5f9; --card: #ffffff;
            --text-main: #0f172a; --text-sub: #64748b;
            --win: #10b981; --lose: #ef4444;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); color: var(--text-main);
            margin: 0; padding: env(safe-area-inset-top) 15px 40px 15px; 
        }

        /* En-tête */
        header { padding: 20px 0; border-bottom: 1px solid #e2e8f0; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }

        /* Cartes et Éléments */
        .card { 
            background: var(--card); padding: 18px; border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05);
        }
        .hidden { display: none; }

        /* Formulaires */
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; color: var(--text-sub); }
        input, select, textarea { 
            width: 100%; padding: 12px 16px; margin-bottom: 15px;
            border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem;
            background: #f8fafc; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        /* Boutons */
        button { 
            background: var(--primary); color: white; border: none; padding: 14px;
            border-radius: 12px; font-weight: 700; cursor: pointer;
            font-size: 1rem; transition: transform 0.1s, background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: scale(0.98); background: var(--primary-dark); }
        .btn-sec { background: #64748b; }
        .btn-dan { background: #fee2e2; color: var(--lose); padding: 8px 12px; font-size: 0.8rem; width: auto; }
        .btn-plus { width: 50px; height: 48px; background: var(--win); margin-bottom: 15px; font-size: 1.5rem; }

        /* Historique & Matchs */
        .event-item { display: flex; justify-content: space-between; align-items: center; }
        .event-info h3 { margin: 0; font-size: 1.1rem; }
        .event-info p { margin: 4px 0 0 0; font-size: 0.85rem; color: var(--text-sub); }

        .match-item { 
            border-left: 6px solid #cbd5e1; padding: 12px; margin: 12px 0;
            background: #fff; border-radius: 8px; position: relative;
        }
        .match-item.WIN { border-color: var(--win); background: #f0fdf4; }
        .match-item.LOSE { border-color: var(--lose); background: #fef2f2; }
        .match-header { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 4px; }
        .match-comment { font-size: 0.85rem; color: var(--text-sub); font-style: italic; margin-top: 5px; }

        /* Stats */
        .stat-bar-bg { background: #e2e8f0; height: 8px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .stat-bar-fill { background: var(--primary); height: 100%; border-radius: 4px; }

        .flex-row { display: flex; gap: 10px; align-items: flex-start; }
    </style>
</head>
<body>

    <header id="main-header">
        <h1>🏆 Tournoi Tracker</h1>
    </header>

    <!-- ACCUEIL -->
    <div id="sec-home">
        <button onclick="nav('sec-new-event')">➕ Nouveau Tournoi</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button class="btn-sec" onclick="nav('sec-decks')">🎴 Decks</button>
            <button class="btn-sec" onclick="nav('sec-stats')">📊 Stats</button>
        </div>

        <h2 style="margin: 25px 0 15px 0; font-size: 1.2rem;">Historique</h2>
        <div id="list-events"></div>
        
        <div style="margin-top:40px; display:flex; gap:10px; opacity: 0.6;">
            <button class="btn-sec" style="font-size:10px; padding: 8px;" onclick="exportData()">💾 Export</button>
            <button class="btn-sec" style="font-size:10px; padding: 8px;" onclick="document.getElementById('fileIn').click()">📂 Import</button>
            <input type="file" id="fileIn" class="hidden" onchange="importData(event)">
        </div>
    </div>

    <!-- NOUVEAU TOURNOI -->
    <div id="sec-new-event" class="hidden">
        <button class="btn-sec" onclick="nav('sec-home')">⬅ Retour</button>
        <div class="card" style="margin-top: 15px;">
            <h2>Démarrer un Tournoi</h2>
            <label>Nom du tournoi</label>
            <input type="text" id="ev-name" placeholder="ex: Cup de Juillet">
            
            <div class="flex-row">
                <div style="flex:1">
                    <label>Date</label>
                    <input type="date" id="ev-date">
                </div>
                <div style="flex:1">
                    <label>Lieu</label>
                    <input type="text" id="ev-place" placeholder="Ville">
                </div>
            </div>
            
            <label>Mon Deck joué</label>
            <div class="flex-row">
                <select id="sel-my-deck"></select>
                <button class="btn-plus" onclick="quickAdd('myDecks', 'sel-my-deck')">+</button>
            </div>
            
            <button onclick="handleCreateTournament()" style="margin-top:10px">🚀 Créer le Tournoi</button>
        </div>
    </div>

    <!-- MATCHS -->
    <div id="sec-matches" class="hidden">
        <button class="btn-sec" onclick="nav('sec-home')">⬅ Retour Accueil</button>
        <div class="card" style="margin-top: 15px; border-bottom: 4px solid var(--primary);">
            <h2 id="view-title" style="margin-bottom: 5px;">---</h2>
            <p id="view-info"></p>
        </div>

        <div id="matches-list"></div>
        
        <div class="card" style="margin-top: 30px; background: #f8fafc;">
            <h3>Ajouter un match</h3>
            <label>Adversaire</label>
            <input type="text" id="m-opp-name" placeholder="Pseudo">
            
            <label>Son Deck</label>
            <div class="flex-row">
                <select id="sel-opp-deck"></select>
                <button class="btn-plus" onclick="quickAdd('oppDecks', 'sel-opp-deck')">+</button>
            </div>
            
            <label>Résultat</label>
            <select id="m-res">
                <option value="WIN">✅ VICTOIRE (WIN)</option>
                <option value="LOSE">❌ DÉFAITE (LOSE)</option>
            </select>
            
            <label>Commentaire</label>
            <textarea id="m-comm" rows="2" placeholder="Ex: Missplay T3..."></textarea>
            
            <button onclick="handleAddMatch()">Enregistrer le Match</button>
        </div>
    </div>

    <!-- GESTION DECKS -->
    <div id="sec-decks" class="hidden">
        <button class="btn-sec" onclick="nav('sec-home')">⬅ Retour</button>
        <div class="card" style="margin-top: 15px;">
            <h3>Mes Decks</h3>
            <div class="flex-row">
                <input type="text" id="in-my-deck" placeholder="Nom du deck">
                <button class="btn-plus" onclick="manualAdd('myDecks', 'in-my-deck')">+</button>
            </div>
            <div id="render-my-decks"></div>
        </div>
        <div class="card">
            <h3>Decks Adversaires</h3>
            <div class="flex-row">
                <input type="text" id="in-opp-deck" placeholder="Nom du deck">
                <button class="btn-plus" onclick="manualAdd('oppDecks', 'in-opp-deck')">+</button>
            </div>
            <div id="render-opp-decks"></div>
        </div>
    </div>

    <!-- STATS -->
    <div id="sec-stats" class="hidden">
        <button class="btn-sec" onclick="nav('sec-home')">⬅ Retour</button>
        <div id="render-stats" style="margin-top: 15px;"></div>
    </div>

<script>
    let db = {
        events: [],
        myDecks: ["Deck Standard"],
        oppDecks: ["Inconnu"],
        activeId: null
    };

    // Formatage de date DD/MM/YY
    function fmtDate(isoStr) {
        if(!isoStr) return "--/--/--";
        const d = new Date(isoStr);
        return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'2-digit'});
    }

    function loadDB() {
        const saved = localStorage.getItem('tournoi_pro_db');
        if(saved) db = JSON.parse(saved);
        
        // Pré-remplir la date du jour
        document.getElementById('ev-date').value = new Date().toISOString().split('T')[0];
        
        renderHome();
        updateAllSelects();
    }

    function saveDB() { localStorage.setItem('tournoi_pro_db', JSON.stringify(db)); }

    function nav(id) {
        document.querySelectorAll('body > div[id^="sec-"]').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'sec-home') renderHome();
        if(id === 'sec-decks') renderDecksView();
        if(id === 'sec-stats') renderStatsView();
        window.scrollTo(0,0);
    }

    function updateAllSelects() {
        const sMy = document.getElementById('sel-my-deck');
        const sOpp = document.getElementById('sel-opp-deck');
        if(sMy) sMy.innerHTML = db.myDecks.sort().map(d => `<option value="${d}">${d}</option>`).join('');
        if(sOpp) sOpp.innerHTML = db.oppDecks.sort().map(d => `<option value="${d}">${d}</option>`).join('');
    }

    function quickAdd(type, selectId) {
        const n = prompt("Nom du nouveau deck :");
        if(n) {
            db[type].push(n);
            saveDB(); updateAllSelects();
            document.getElementById(selectId).value = n;
        }
    }

    function manualAdd(type, inputId) {
        const val = document.getElementById(inputId).value;
        if(val) {
            db[type].push(val);
            document.getElementById(inputId).value = "";
            saveDB(); updateAllSelects(); renderDecksView();
        }
    }

    function deleteDeck(type, name) {
        if(confirm(`Supprimer "${name}" ?`)) {
            db[type] = db[type].filter(d => d !== name);
            saveDB(); updateAllSelects(); renderDecksView();
        }
    }

    function renderDecksView() {
        const ui = (type, divId) => {
            document.getElementById(divId).innerHTML = db[type].sort().map(d => `
                <div class="stats-row">
                    <span style="font-weight:500">${d}</span>
                    <button class="btn-dan" onclick="deleteDeck('${type}', '${d}')">Suppr</button>
                </div>
            `).join('');
        };
        ui('myDecks', 'render-my-decks');
        ui('oppDecks', 'render-opp-decks');
    }

    function handleCreateTournament() {
        const newEv = {
            id: Date.now(),
            name: document.getElementById('ev-name').value || "Tournoi",
            date: document.getElementById('ev-date').value,
            place: document.getElementById('ev-place').value || "",
            myDeck: document.getElementById('sel-my-deck').value,
            matches: []
        };
        db.events.unshift(newEv);
        saveDB();
        openTournament(newEv.id);
    }

    function openTournament(id) {
        db.activeId = id;
        const ev = db.events.find(e => e.id === id);
        if(!ev) return nav('sec-home');
        document.getElementById('view-title').innerText = ev.name;
        document.getElementById('view-info').innerHTML = `📅 ${fmtDate(ev.date)} • 📍 ${ev.place || 'NC'}<br><b>🎴 Mon Deck : ${ev.myDeck}</b>`;
        renderMatchesView(ev);
        nav('sec-matches');
    }

    function renderHome() {
        document.getElementById('list-events').innerHTML = db.events.map(ev => `
            <div class="card event-item">
                <div class="event-info">
                    <h3>${ev.name}</h3>
                    <p>${fmtDate(ev.date)} • ${ev.myDeck}</p>
                    <p style="color:var(--primary); font-weight:700;">${ev.matches.length} matches</p>
                </div>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <button onclick="openTournament(${ev.id})" style="padding: 10px 20px;">Ouvrir</button>
                    <button class="btn-dan" onclick="deleteEvent(${ev.id})">Suppr</button>
                </div>
            </div>
        `).join('');
    }

    function deleteEvent(id) {
        if(confirm("Supprimer ce tournoi et tous ses matchs ?")) {
            db.events = db.events.filter(e => e.id !== id);
            saveDB(); renderHome();
        }
    }

    function handleAddMatch() {
        const ev = db.events.find(e => e.id === db.activeId);
        ev.matches.push({
            id: Date.now(),
            oppName: document.getElementById('m-opp-name').value || "Adversaire",
            oppDeck: document.getElementById('sel-opp-deck').value,
            res: document.getElementById('m-res').value,
            comm: document.getElementById('m-comm').value || ""
        });
        saveDB();
        renderMatchesView(ev);
        document.getElementById('m-opp-name').value = "";
        document.getElementById('m-comm').value = "";
    }

    function renderMatchesView(ev) {
        document.getElementById('matches-list').innerHTML = ev.matches.map(m => `
            <div class="match-item ${m.res}">
                <div class="match-header">
                    <span>${m.res === 'WIN' ? '✅ Victoire' : '❌ Défaite'} vs ${m.oppName}</span>
                    <button class="btn-dan" style="padding:4px 8px" onclick="deleteMatch(${m.id})">X</button>
                </div>
                <div class="deck-tag">Deck Adv: ${m.oppDeck}</div>
                ${m.comm ? `<div class="match-comment">"${m.comm}"</div>` : ''}
            </div>
        `).join('');
    }

    function deleteMatch(mId) {
        const ev = db.events.find(e => e.id === db.activeId);
        ev.matches = ev.matches.filter(m => m.id !== mId);
        saveDB(); renderMatchesView(ev);
    }

    function renderStatsView() {
        let stats = {};
        db.events.forEach(ev => {
            if(!stats[ev.myDeck]) stats[ev.myDeck] = { w: 0, l: 0 };
            ev.matches.forEach(m => {
                if(m.res === 'WIN') stats[ev.myDeck].w++;
                else stats[ev.myDeck].l++;
            });
        });
        
        let html = "<h2>Ratio par Deck joué</h2>";
        for(let d in stats) {
            let total = stats[d].w + stats[d].l;
            let wr = total > 0 ? Math.round((stats[d].w / total) * 100) : 0;
            html += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; font-weight:700;">
                        <span>${d}</span>
                        <span>${wr}%</span>
                    </div>
                    <div style="font-size:0.85rem; color:var(--text-sub); margin-top:4px;">
                        ${stats[d].w} Victoires • ${stats[d].l} Défaites
                    </div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width: ${wr}%; background: ${wr > 50 ? 'var(--win)' : 'var(--primary)'}"></div>
                    </div>
                </div>`;
        }
        document.getElementById('render-stats').innerHTML = html || "<div class='card'>Aucune donnée.</div>";
    }

    function exportData() {
        const b = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b); a.download = `backup_tcg_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function importData(e) {
        const r = new FileReader();
        r.onload = (event) => {
            db = JSON.parse(event.target.result);
            saveDB(); loadDB(); nav('sec-home');
        };
        r.readAsText(e.target.files[0]);
    }

    loadDB();
</script>
</body>
</html>
