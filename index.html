<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Tournois</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1, h2, h3 { margin-top: 0; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 16px; }
        .btn-secondary { background: #64748b; }
        .btn-danger { background: #ef4444; }
        .btn-small { padding: 5px 10px; width: auto; font-size: 12px; display: inline-block; margin: 2px; }
        .match-item { border-left: 5px solid #ddd; padding: 10px; margin-bottom: 10px; background: #fff; border-radius: 4px; position: relative; }
        .win { border-color: #22c55e; }
        .lose { border-color: #ef4444; }
        .hidden { display: none; }
        .deck-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 8px 0; }
        .tab-buttons { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-buttons button { font-size: 12px; padding: 8px; }
    </style>
</head>
<body>

    <!-- MENU PRINCIPAL -->
    <div id="section-liste">
        <h1>🏆 Mes Tournois</h1>
        <button onclick="showSection('section-nouveau')">➕ Nouvel Event</button>
        <button class="btn-secondary" onclick="showSection('section-decks')" style="margin-top:10px">🎴 Gérer mes Decks / Adversaires</button>
        <button class="btn-secondary" onclick="showSection('section-stats')" style="margin-top:10px">📊 Mes Performances</button>
        
        <h2 style="margin-top:25px;">Historique</h2>
        <div id="liste-events"></div>
        
        <div style="display:flex; gap:10px; margin-top:30px;">
            <button class="btn-secondary" style="font-size:10px" onclick="exportData()">💾 Export JSON</button>
            <button class="btn-secondary" style="font-size:10px" onclick="document.getElementById('importFile').click()">📂 Import</button>
            <input type="file" id="importFile" class="hidden" onchange="importData(event)">
        </div>
    </div>

    <!-- NOUVEL EVENT -->
    <div id="section-nouveau" class="hidden">
        <button class="btn-secondary" onclick="showSection('section-liste')">⬅ Retour</button>
        <div class="card">
            <h2>Nouveau Tournoi</h2>
            <input type="text" id="event-nom" placeholder="Nom du tournoi">
            <input type="date" id="event-date">
            <input type="text" id="event-lieu" placeholder="Lieu (Optionnel)">
            <label><strong>Deck que je vais jouer :</strong></label>
            <select id="mon-deck-event"></select>
            <button onclick="creerEvenement()">Démarrer le tournoi</button>
        </div>
    </div>

    <!-- MATCHS D'UN EVENT -->
    <div id="section-matchs" class="hidden">
        <button class="btn-secondary" onclick="showSection('section-liste')">⬅ Retour</button>
        <div class="card">
            <h2 id="current-event-title">Matchs</h2>
            <p id="current-event-mydeck" style="font-style: italic; color: #64748b;"></p>
            <div id="matchs-container"></div>
            <hr>
            <h3>Ajouter un match</h3>
            <input type="text" id="opp-nom" placeholder="Nom de l'adversaire">
            <select id="opp-deck-select"></select>
            <select id="mon-resultat">
                <option value="win">VICTOIRE (Win)</option>
                <option value="lose">DÉFAITE (Lose)</option>
            </select>
            <textarea id="match-comment" placeholder="Commentaires..."></textarea>
            <button onclick="ajouterMatch()">Enregistrer le résultat</button>
        </div>
    </div>

    <!-- GESTION DES DECKS -->
    <div id="section-decks" class="hidden">
        <button class="btn-secondary" onclick="showSection('section-liste')">⬅ Retour</button>
        <div class="card">
            <h2>Gestion des Decks</h2>
            <div class="tab-buttons">
                <button onclick="renderDecks('mesDecks')">Mes Decks Perso</button>
                <button class="btn-secondary" onclick="renderDecks('oppDecks')">Decks Adversaires</button>
            </div>
            <h3 id="deck-type-title">Mes Decks Perso</h3>
            <input type="text" id="new-deck-name" placeholder="Nom du deck">
            <button onclick="ajouterDeck()">Ajouter ce deck</button>
            <div id="decks-list-render" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- STATS -->
    <div id="section-stats" class="hidden">
        <button class="btn-secondary" onclick="showSection('section-liste')">⬅ Retour</button>
        <div class="card">
            <h2>Récap par Deck utilisé</h2>
            <div id="stats-content"></div>
        </div>
    </div>

<script>
    let state = { 
        events: [], 
        mesDecks: ["Mon Deck A"], 
        oppDecks: ["Deck adverse X"],
        currentEventId: null,
        currentDeckView: 'mesDecks' 
    };

    function init() {
        const saved = localStorage.getItem('tournoi_db_v2');
        if (saved) state = JSON.parse(saved);
        renderEvents();
        updateAllSelects();
    }

    function save() {
        localStorage.setItem('tournoi_db_v2', JSON.stringify(state));
    }

    function showSection(id) {
        document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'section-stats') renderStats();
        if(id === 'section-decks') renderDecks(state.currentDeckView);
        if(id === 'section-nouveau') updateAllSelects();
        window.scrollTo(0,0);
    }

    // GESTION DECKS
    function renderDecks(type) {
        state.currentDeckView = type;
        document.getElementById('deck-type-title').innerText = type === 'mesDecks' ? "Mes Decks Perso" : "Decks Adversaires";
        const list = document.getElementById('decks-list-render');
        list.innerHTML = "";
        state[type].sort().forEach((deck, index) => {
            list.innerHTML += `<div class="deck-row">
                <span>${deck}</span>
                <button class="btn-danger btn-small" onclick="supprimerDeck('${type}', ${index})">X</button>
            </div>`;
        });
        updateAllSelects();
    }

    function ajouterDeck() {
        const name = document.getElementById('new-deck-name').value;
        const type = state.currentDeckView;
        if (name) {
            state[type].push(name);
            document.getElementById('new-deck-name').value = "";
            save(); renderDecks(type);
        }
    }

    function supprimerDeck(type, index) {
        if(confirm("Supprimer ce deck ?")) {
            state[type].splice(index, 1);
            save(); renderDecks(type);
        }
    }

    function updateAllSelects() {
        const mySelect = document.getElementById('mon-deck-event');
        const oppSelect = document.getElementById('opp-deck-select');
        
        mySelect.innerHTML = state.mesDecks.map(d => `<option value="${d}">${d}</option>`).join('');
        oppSelect.innerHTML = '<option value="">-- Deck adverse --</option>' + 
                              state.oppDecks.map(d => `<option value="${d}">${d}</option>`).join('');
    }

    // EVENTS
    function creerEvenement() {
        const nom = document.getElementById('event-nom').value || "Tournoi";
        const myDeck = document.getElementById('mon-deck-event').value;
        if(!myDeck) return alert("Créez d'abord un deck perso dans 'Gérer les decks'");
        
        const newEvent = { 
            id: Date.now(), 
            nom, 
            date: document.getElementById('event-date').value || new Date().toISOString().split('T')[0], 
            lieu: document.getElementById('event-lieu').value,
            myDeck: myDeck,
            matchs: [] 
        };
        state.events.unshift(newEvent);
        save(); renderEvents(); ouvrirEvent(newEvent.id);
    }

    function renderEvents() {
        const container = document.getElementById('liste-events');
        container.innerHTML = "";
        state.events.forEach(ev => {
            container.innerHTML += `<div class="card">
                <strong>${ev.date} - ${ev.nom}</strong><br>
                <small>Joué avec : ${ev.myDeck}</small><br>
                <button onclick="ouvrirEvent(${ev.id})">Ouvrir (${ev.matchs.length} matchs)</button>
                <button class="btn-danger btn-small" onclick="supprimerEvent(${ev.id})">Supprimer</button>
            </div>`;
        });
    }

    function ouvrirEvent(id) {
        state.currentEventId = id;
        const ev = state.events.find(e => e.id === id);
        document.getElementById('current-event-title').innerText = ev.nom;
        document.getElementById('current-event-mydeck').innerText = "Mon deck : " + ev.myDeck;
        renderMatchs();
        showSection('section-matchs');
    }

    function supprimerEvent(id) {
        if(confirm("Supprimer ce tournoi ?")) {
            state.events = state.events.filter(e => e.id !== id);
            save(); renderEvents();
        }
    }

    // MATCHS
    function ajouterMatch() {
        const oppDeck = document.getElementById('opp-deck-select').value;
        if(!oppDeck) return alert("Sélectionnez le deck adverse");
        
        const ev = state.events.find(e => e.id === state.currentEventId);
        ev.matchs.push({
            id: Date.now(),
            opp: document.getElementById('opp-nom').value || "Inconnu",
            deck: oppDeck,
            res: document.getElementById('mon-resultat').value,
            comm: document.getElementById('match-comment').value
        });
        save(); renderMatchs();
        document.getElementById('opp-nom').value = "";
        document.getElementById('match-comment').value = "";
    }

    function renderMatchs() {
        const ev = state.events.find(e => e.id === state.currentEventId);
        const container = document.getElementById('matchs-container');
        container.innerHTML = "";
        ev.matchs.forEach(m => {
            container.innerHTML += `<div class="match-item ${m.res}">
                <strong>${m.res.toUpperCase()}</strong> vs ${m.opp} (${m.deck})
                <br><small>${m.comm}</small>
                <button class="btn-danger btn-small" style="position:absolute; right:5px; top:5px;" onclick="supprimerMatch(${m.id})">X</button>
            </div>`;
        });
    }

    function supprimerMatch(matchId) {
        const ev = state.events.find(e => e.id === state.currentEventId);
        ev.matchs = ev.matchs.filter(m => m.id !== matchId);
        save(); renderMatchs();
    }

    // STATS
    function renderStats() {
        const myDeckStats = {};
        state.events.forEach(ev => {
            if(!myDeckStats[ev.myDeck]) myDeckStats[ev.myDeck] = { win: 0, lose: 0 };
            ev.matchs.forEach(m => {
                myDeckStats[ev.myDeck][m.res]++;
            });
        });
        let html = "";
        for(let d in myDeckStats) {
            const total = myDeckStats[d].win + myDeckStats[d].lose;
            const wr = total > 0 ? Math.round((myDeckStats[d].win / total) * 100) : 0;
            html += `<div class="deck-row"><strong>${d}</strong> <span>${myDeckStats[d].win}W - ${myDeckStats[d].lose}L (${wr}%)</span></div>`;
        }
        document.getElementById('stats-content').innerHTML = html || "Aucune donnée";
    }

    // IMPORT/EXPORT
    function exportData() {
        const blob = new Blob([JSON.stringify(state)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "sauvegarde_tournois.json";
        a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            state = JSON.parse(e.target.result);
            save(); init(); alert("Données chargées !");
        };
        reader.readAsText(file);
    }

    init();
</script>
</body>
</html>
